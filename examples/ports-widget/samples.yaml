kind: Service
apiVersion: v1
metadata:
  name: test-ports-service
  namespace: ports-widget
spec:
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
    - name: https
      protocol: TCP
      port: 443
      targetPort: 8443
    - name: grpc
      protocol: TCP
      port: 9090
  selector:
    app: test-app
  type: ClusterIP
